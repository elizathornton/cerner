<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cerner Launch Test</title>
  <script src="https://cdn.jsdelivr.net/npm/fhirclient/build/fhir-client.js"></script>
</head>
<body>
  <p>Starting SMART launch... Version LAUNCH-1</p>

  <script>

    FHIR.oauth2.authorize({
      clientId: "200d9fed-28c1-474a-b9b2-09909d5f5cbf",
      scope: "launch launch/patient openid fhirUser online_access patient/Patient.read patient/Communication.read patient/Communication.write user/Communication.write",
      
      redirectUri: "https://elizathornton.github.io/cerner/index.html"


    });

      console.log("Granted token response:", client.state?.tokenResponse);
      console.log("Granted scope string:", client.state?.tokenResponse?.scope);
      ShowOutput({
        info: "Launch succeeded",
        grantedScopes: client.state?.tokenResponse?.scope || "(none)"
      });


  </script>
</body>
</html>
